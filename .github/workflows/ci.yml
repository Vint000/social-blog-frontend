name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blogdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Gerar cliente Prisma
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blogdb?schema=public
        run: npx prisma generate

      - name: Executar testes
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/blogdb?schema=public
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagem backend
        run: docker build -t blogeducamais-backend ./backend

      - name: Build imagem frontend
        run: docker build -t blogeducamais-frontend ./frontend
